workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.median.ios.odpqobl
      vars:
        BUNDLE_ID: co.median.ios.odpqobl
        XCODE_WORKSPACE: EsraUAESTORE.xcworkspace
        XCODE_SCHEME: EsraUAESTORE
      xcode: latest
    scripts:
      - name: Configure Swift Package Registry
        script: |
          set -e
          swift package-registry set --global "https://packages.median.co"
          swift package-registry set --global --scope median "https://packages.median.co"
          REGISTRY_DIR="./EsraUAESTORE.xcworkspace/xcshareddata/swiftpm/configuration"
          mkdir -p "$REGISTRY_DIR"
          printf '%s\n' \
            '{' \
            '  "authentication": {},' \
            '  "registries": {' \
            '    "[default]": {' \
            '      "supportsAvailability": false,' \
            '      "url": "https://packages.median.co"' \
            '    },' \
            '    "median": {' \
            '      "supportsAvailability": false,' \
            '      "url": "https://packages.median.co"' \
            '    }' \
            '  },' \
            '  "version": 1' \
            '}' > "$REGISTRY_DIR/registries.json"
          for file in \
            Derived/Sources/TuistAssets+EsraUAESTORE.swift \
            Derived/Sources/TuistBundle+EsraUAESTORE.swift \
            Derived/Sources/TuistFonts+EsraUAESTORE.swift \
            Derived/Sources/TuistPlists+EsraUAESTORE.swift \
            Derived/Sources/TuistStrings+EsraUAESTORE.swift
          do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done
          echo "Registry configured and required source files are present."
      - name: Set up code signing settings on Xcode project
        script: |
          set -e
          xcode-project use-profiles --project EsraUAESTORE.xcodeproj
      - name: Build ipa for distribution
        script: |
          set -e
          if [ ! -d "./${XCODE_WORKSPACE}" ]; then
            echo "Workspace not found: ${XCODE_WORKSPACE}"
            exit 1
          fi
          echo "Building workspace: ${XCODE_WORKSPACE}; scheme: ${XCODE_SCHEME}; bundle id: ${BUNDLE_ID}"
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
