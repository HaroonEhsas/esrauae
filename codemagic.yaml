workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    triggering:
      events:
        - push
    environment:
      vars:
        DEVELOPMENT_TEAM:
          value: "ENTER_YOUR_TEAM_ID"
          is_secret: false
        BUNDLE_ID:
          value: "io.gonative.ios"
          is_secret: false
        APP_STORE_CONNECT_ISSUER_ID:
          value: "ENTER_ISSUER_ID"
          is_secret: true
        APP_STORE_CONNECT_KEY_ID:
          value: "ENTER_KEY_ID"
          is_secret: true
        APP_STORE_CONNECT_PRIVATE_KEY:
          value: "-----BEGIN PRIVATE KEY-----\nREPLACE_WITH_P8_CONTENT\n-----END PRIVATE KEY-----"
          is_secret: true
    scripts:
      - name: Install Tuist
        script: |
          curl -Ls https://install.tuist.io | bash
      - name: Generate workspace
        script: |
          tuist generate
      - name: Build archive
        script: |
          xcodebuild -workspace MedianIOS.xcworkspace \
            -scheme Median \
            -configuration Release \
            -sdk iphoneos \
            archive \
            -archivePath $CM_BUILD_DIR/build/Median.xcarchive \
            DEVELOPMENT_TEAM=${DEVELOPMENT_TEAM} \
            PRODUCT_BUNDLE_IDENTIFIER=${BUNDLE_ID}
      - name: Export IPA
        script: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/Median.xcarchive \
            -exportPath $CM_BUILD_DIR/build/ipa \
            -exportOptionsPlist ExportOptions.plist
