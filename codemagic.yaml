workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    triggering:
      events:
        - push
    # Environment variables should be configured in Codemagic UI (do not store secrets in repo)
    # Example: create a variable group `app-store-credentials` in Codemagic and add
    # DEVELOPMENT_TEAM, BUNDLE_ID, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_ID,
    # and APP_STORE_CONNECT_PRIVATE_KEY there. Then import the group into this workflow.
    # To import a group, add:
    # environment:
    #   groups:
    #     - app-store-credentials
    scripts:
      - name: Install Tuist
        script: |
          # Ensure common brew paths and tuist bin are in PATH
          export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.tuist/bin:$PATH"
          brew update || true
          brew tap tuist/tuist || true
          brew install tuist || true
          # Fallback to official installer if brew didn't provide tuist
          if ! command -v tuist >/dev/null 2>&1; then
            curl -Ls https://install.tuist.io | bash || true
          fi
          export PATH="$HOME/.tuist/bin:$PATH"
          tuist --version || true
      - name: Generate workspace
        script: |
          # Ensure tuist is on PATH for this step
          export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.tuist/bin:$PATH"
          if command -v tuist >/dev/null 2>&1; then
            tuist --version
            tuist generate
          else
            echo "tuist not found; skipping generate step"
          fi
      - name: Build archive
        script: |
          set -e
          # choose workspace: prefer generated MedianIOS, fall back to EsraUAESTORE
          # Search recursively for an .xcworkspace first, then .xcodeproj
          WORKSPACE=$(find . -name "*.xcworkspace" -print -quit 2>/dev/null || true)
          if [ -n "$WORKSPACE" ]; then
            SCHEME=$(basename "$WORKSPACE" .xcworkspace)
            echo "Found workspace: $WORKSPACE; using scheme: $SCHEME"
            xcodebuild -workspace "$WORKSPACE" \
              -scheme "$SCHEME" \
              -configuration Release \
              -sdk iphoneos \
              archive \
              -archivePath $CM_BUILD_DIR/build/$SCHEME.xcarchive \
              DEVELOPMENT_TEAM=${DEVELOPMENT_TEAM} \
              PRODUCT_BUNDLE_IDENTIFIER=${BUNDLE_ID}
          else
            PROJECT=$(find . -name "*.xcodeproj" -print -quit 2>/dev/null || true)
            if [ -n "$PROJECT" ]; then
              SCHEME=$(basename "$PROJECT" .xcodeproj)
              echo "No workspace found; using project: $PROJECT and scheme: $SCHEME"
              xcodebuild -project "$PROJECT" \
                -scheme "$SCHEME" \
                -configuration Release \
                -sdk iphoneos \
                archive \
                -archivePath $CM_BUILD_DIR/build/$SCHEME.xcarchive \
                DEVELOPMENT_TEAM=${DEVELOPMENT_TEAM} \
                PRODUCT_BUNDLE_IDENTIFIER=${BUNDLE_ID}
            else
              echo "No .xcworkspace or .xcodeproj found in repo. Exiting."; exit 1
            fi
          fi
      - name: Export IPA
        script: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/Median.xcarchive \
            -exportPath $CM_BUILD_DIR/build/ipa \
            -exportOptionsPlist ExportOptions.plist
