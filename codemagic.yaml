workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    triggering:
      events:
        - push
    # Environment variables should be configured in Codemagic UI (do not store secrets in repo)
    # Example: create a variable group `app-store-credentials` in Codemagic and add
    # DEVELOPMENT_TEAM, BUNDLE_ID, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_ID,
    # and APP_STORE_CONNECT_PRIVATE_KEY there. Then import the group into this workflow.
    # To import a group, add:
    # environment:
    #   groups:
    #     - app-store-credentials
    scripts:
      - name: Configure Swift Package Registry
        script: |
          set -e
          # Median packages (median.go-native-core, median.median-icons) resolve from
          # packages.median.co. Without this, xcodebuild fails with:
          # "no registry configured for 'median' scope"
          swift package-registry set --global "https://packages.median.co"
          swift package-registry set --global --scope median "https://packages.median.co"
          echo "Global registry configuration:"
          cat ~/.swiftpm/configuration/registries.json
      - name: Install Tuist
        script: |
          # Ensure common brew paths and tuist bin are in PATH
          export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.tuist/bin:$PATH"
          brew update || true
          brew tap tuist/tuist || true
          brew install tuist || true
          # Fallback to official installer if brew didn't provide tuist
          if ! command -v tuist >/dev/null 2>&1; then
            curl -Ls https://install.tuist.io | bash || true
          fi
          export PATH="$HOME/.tuist/bin:$PATH"
          tuist --version || true
      - name: Generate workspace
        script: |
          set -e
          export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.tuist/bin:$PATH"
          # Match the checked-in EsraUAESTORE project generated by Median App Studio
          export TUIST_PROJECT_NAME="${TUIST_PROJECT_NAME:-EsraUAESTORE}"
          export TUIST_TARGET_NAME="${TUIST_TARGET_NAME:-EsraUAESTORE}"
          export TUIST_BUNDLE_ID="${TUIST_BUNDLE_ID:-${BUNDLE_ID:-co.median.ios.odpqobl}}"
          export TUIST_APP_NAME="${TUIST_APP_NAME:-Esra UAE – STORE}"
          if command -v tuist >/dev/null 2>&1; then
            tuist --version
            tuist generate
          else
            echo "tuist not found; using checked-in EsraUAESTORE.xcworkspace"
          fi
          # tuist generate can recreate the workspace without SPM registry metadata
          REGISTRY_DIR="./EsraUAESTORE.xcworkspace/xcshareddata/swiftpm/configuration"
          mkdir -p "$REGISTRY_DIR"
          printf '%s\n' \
            '{' \
            '  "authentication": {},' \
            '  "registries": {' \
            '    "[default]": {' \
            '      "supportsAvailability": false,' \
            '      "url": "https://packages.median.co"' \
            '    },' \
            '    "median": {' \
            '      "supportsAvailability": false,' \
            '      "url": "https://packages.median.co"' \
            '    }' \
            '  },' \
            '  "version": 1' \
            '}' > "$REGISTRY_DIR/registries.json"
          echo "Workspace registry configuration:"
          cat "$REGISTRY_DIR/registries.json"
      - name: Build archive
        script: |
          set -e
          mkdir -p "$CM_BUILD_DIR/build"
          echo "Listing candidate .xcworkspace directories:"
          find . -type d -name "*.xcworkspace" ! -path "*/._*" ! -path "*/.xcodeproj/*" | sort || true
          if [ -d "./EsraUAESTORE.xcworkspace" ]; then
            WORKSPACE="./EsraUAESTORE.xcworkspace"
          elif [ -d "./MedianIOS.xcworkspace" ]; then
            WORKSPACE="./MedianIOS.xcworkspace"
          else
            WORKSPACE=$(find . -type d -name "*.xcworkspace" ! -path "*/._*" ! -path "*/.xcodeproj/*" -print -quit 2>/dev/null || true)
          fi
          if [ -z "$WORKSPACE" ]; then
            echo "No root .xcworkspace found. Do not build from .xcodeproj/project.xcworkspace."
            exit 1
          fi
          if [[ "$WORKSPACE" == *".xcodeproj/"* ]]; then
            echo "Refusing to build nested workspace: $WORKSPACE"
            echo "Use EsraUAESTORE.xcworkspace at the repo root."
            exit 1
          fi
          BASENAME=$(basename "$WORKSPACE")
          if [ "$BASENAME" = "EsraUAESTORE.xcworkspace" ]; then
            SCHEME="EsraUAESTORE-Workspace"
          elif [ "$BASENAME" = "MedianIOS.xcworkspace" ]; then
            SCHEME="Median"
          else
            echo "Available schemes for workspace $WORKSPACE:"
            xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" 2>/dev/null | awk '/Schemes:/ {getline; while($0 && $0 !~ /^$/){gsub(/^[[:space:]]+/, ""); print; getline}}' | head -n 1)
          fi
          BUNDLE_ID="${BUNDLE_ID:-co.median.ios.odpqobl}"
          if [ -z "$DEVELOPMENT_TEAM" ]; then
            echo "WARNING: DEVELOPMENT_TEAM is not set in Codemagic. Set it in Environment variables."
          fi
          echo "Found workspace: $WORKSPACE; using scheme: $SCHEME; bundle id: $BUNDLE_ID"
          echo "$SCHEME" > "$CM_BUILD_DIR/build/scheme.txt"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            archive \
            -archivePath "$CM_BUILD_DIR/build/$SCHEME.xcarchive" \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            PRODUCT_BUNDLE_IDENTIFIER="${BUNDLE_ID}"
      - name: Export IPA
        script: |
          set -e
          SCHEME="$(cat "$CM_BUILD_DIR/build/scheme.txt")"
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/$SCHEME.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ipa" \
            -exportOptionsPlist ExportOptions.plist
